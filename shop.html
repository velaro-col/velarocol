<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop | VÉLARO</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ══ SHOP NAVBAR ══ -->
  <header class="shop-topbar">
    <div class="container shop-nav">
      <a class="logo shop-logo" href="index.html">
        <img src="Logo.webp" alt="VÉLARO" />
      </a>
      <nav class="menu">
        <a href="index.html#inicio">Inicio</a>
        <a href="index.html#perfumes">Perfumería</a>
        <a href="shop.html" class="active">Shop</a>
      </nav>
    </div>
  </header>

  <!-- ══ SHOP CONTENT ══ -->
  <div class="shop-page-content">
    <div class="shop-page-header">
      <img src="Velaro-shop.webp" alt="Vélaro Shop" class="shop-page-banner" />
    </div>

    <!-- Filtros por categoría + búsqueda -->
    <div class="brand-filter-bar" id="shopFilterBar" style="display:none">
      <div class="brand-filter-inner">
        <div class="filter-btns-wrap">
          <button class="scroll-arrow" id="shop-arrow-left" onclick="scrollShopFilters(-1)" aria-label="Anterior">&#8592;</button>
          <div class="filter-btns" id="shopFilterBtns"></div>
          <button class="scroll-arrow" id="shop-arrow-right" onclick="scrollShopFilters(1)" aria-label="Siguiente">&#8594;</button>
        </div>
        <div class="search-wrap">
          <input type="text" id="shopSearchInput" onkeyup="shopApplyFilters()" placeholder="Buscar producto..." class="search-input" aria-label="Buscar en el shop" />
        </div>
      </div>
    </div>

    <!-- Sub-filtros -->
    <div class="brand-filter-bar shop-subfilter-bar" id="shopSubFilterBar" style="display:none">
      <div class="brand-filter-inner">
        <div class="filter-btns-wrap">
          <button class="scroll-arrow" id="shop-sub-arrow-left" onclick="scrollShopSubFilters(-1)" aria-label="Anterior">&#8592;</button>
          <div class="filter-btns" id="shopSubFilterBtns"></div>
          <button class="scroll-arrow" id="shop-sub-arrow-right" onclick="scrollShopSubFilters(1)" aria-label="Siguiente">&#8594;</button>
        </div>
      </div>
    </div>

    <!-- Loading -->
    <div class="shop-loading" id="shopLoading">
      <div class="shop-spinner"></div>
      <p>Cargando productos...</p>
    </div>

    <!-- Error -->
    <div class="shop-error" id="shopError" style="display:none">
      <p id="shopErrorMsg">No se pudo cargar el catálogo.</p>
    </div>

    <!-- Grid -->
    <div class="container">
      <div class="products-grid shop-grid" id="shopGrid" style="display:none"></div>
      <div class="shop-empty" id="shopEmpty" style="display:none">
        <p>No hay productos que coincidan con tu búsqueda.</p>
      </div>
      <div class="shop-load-more-wrap" id="shopLoadMoreWrap" style="display:none">
        <button class="shop-load-more-btn" id="shopLoadMoreBtn" onclick="shopRenderMore()">
          Ver más <span id="shopLoadMoreCount"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- ══ FOOTER ══ -->
  <footer>
    <div class="container footer-row">
      <span>© 2026 VÉLARO · Tienda virtual de lujo</span>
      <span>Moda · Accesorios · Perfumes</span>
    </div>
  </footer>

  <!-- ══ CARRITO FAB ══ -->
  <button class="cart-fab" id="cartFab" onclick="openCart()" aria-label="Ver carrito">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
    <span class="cart-fab-badge" id="cartBadge" aria-live="polite" aria-label="Productos en el carrito">0</span>
  </button>

  <div class="cart-drawer-overlay" id="cartOverlay" onclick="closeCart()"></div>

  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer-header">
      <span class="cart-drawer-title">Mi selección</span>
      <button class="cart-close-btn" onclick="closeCart()">&#10005;</button>
    </div>
    <div class="cart-items-list" id="cartItemsList">
      <div class="cart-empty" id="cartEmpty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
        <span>Tu selección está vacía</span>
      </div>
    </div>
    <div class="cart-footer">
      <p class="cart-count-label">Productos seleccionados: <span id="cartCountLabel" aria-live="polite">0</span></p>
      <p class="cart-subtotal" id="cartSubtotal" style="display:none">Subtotal: <span id="cartSubtotalValue">$ 0</span></p>
      <button class="cart-whatsapp-btn" id="cartWhatsappBtn" onclick="sendWhatsApp()" disabled>
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.999 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.985-1.407A9.945 9.945 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
        Pedir por WhatsApp
      </button>
      <button class="cart-clear-btn" id="cartClearBtn" onclick="clearCart()" style="display:none">Vaciar selección</button>
    </div>
  </div>

  <!-- ══ MODAL VISOR (solo modo shop: imagen ampliada + lupa) ══ -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal-box" id="modalBox">
      <button class="modal-close" onclick="closeModal()" aria-label="Cerrar">&#10005;</button>
      <div class="modal-img-side">
        <img id="modalImg" src="" alt="" />
        <div class="shop-viewer-caption">
          <p class="shop-viewer-brand" id="shopViewerBrand"></p>
          <h3 class="shop-viewer-name" id="shopViewerName"></h3>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
